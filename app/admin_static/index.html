<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>DaBro Taxi — Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--border:#30363d;--gold:#f5c518;--gold-dim:#b8960f;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--danger:#f85149;--info:#58a6ff;--radius:12px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-text-size-adjust:100%}
    .header{background:linear-gradient(135deg,#1a1f2e 0%,#0d1117 100%);padding:16px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .header h1{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:1px}
    .header .subtitle{font-size:11px;color:var(--text-dim);margin-top:2px}
    #auth-status{font-size:12px;padding:6px 12px;margin-top:8px;border-radius:20px;display:inline-block}
    #auth-status.ok{background:rgba(63,185,80,.15);color:var(--success)}
    #auth-status.err{background:rgba(248,81,73,.15);color:var(--danger)}
    #auth-status.loading{background:rgba(245,197,24,.15);color:var(--gold)}
    .refresh-btn{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .refresh-btn:active{transform:scale(.9)}
    .tabs{display:flex;overflow-x:auto;gap:4px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:68px;z-index:99;-webkit-overflow-scrolling:touch}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;padding:8px 14px;border:none;border-radius:20px;background:var(--surface2);color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .tab-btn.active{background:var(--gold);color:#000;font-weight:600}
    .content{padding:12px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
    .card-title{font-size:14px;font-weight:600;color:var(--gold);word-break:break-word}
    .badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
    .b-new{background:rgba(88,166,255,.15);color:var(--info)}
    .b-assigned{background:rgba(245,197,24,.15);color:var(--gold)}
    .b-in_progress{background:rgba(63,185,80,.15);color:var(--success)}
    .b-completed{background:rgba(139,148,158,.15);color:var(--text-dim)}
    .b-admin_review{background:rgba(248,81,73,.15);color:var(--danger)}
    .b-pending{background:rgba(245,197,24,.15);color:var(--gold)}
    .b-active{background:rgba(63,185,80,.15);color:var(--success)}
    .b-blocked{background:rgba(248,81,73,.15);color:var(--danger)}
    .b-confirmed{background:rgba(63,185,80,.15);color:var(--success)}
    .b-awaiting_admin{background:rgba(245,197,24,.15);color:var(--gold)}
    .b-suggested{background:rgba(88,166,255,.15);color:var(--info)}
    .b-failed{background:rgba(248,81,73,.15);color:var(--danger)}
    .row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(48,54,61,.4)}
    .row:last-child{border-bottom:none}
    .row .lbl{color:var(--text-dim)}
    .row .val{color:var(--text);font-weight:500;text-align:right;max-width:60%;word-break:break-word}
    .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .btn{padding:9px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .btn:active{transform:scale(.95);opacity:.8}
    .btn-gold{background:var(--gold);color:#000}
    .btn-success{background:var(--success);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px}
    .form-group input,.form-group select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none}
    .form-group input:focus,.form-group select:focus{border-color:var(--gold)}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
    .stat-card .num{font-size:24px;font-weight:700;color:var(--gold)}
    .stat-card .slbl{font-size:11px;color:var(--text-dim);margin-top:4px}
    .empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
    .loader{text-align:center;padding:30px;color:var(--gold);font-size:14px}
    .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
    .modal-overlay.visible{display:flex}
    .modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal h3{color:var(--gold);margin-bottom:16px;font-size:16px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.visible{opacity:1}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .chip{padding:6px 14px;border:1px solid var(--border);border-radius:16px;background:var(--surface2);color:var(--text-dim);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .chip:active{transform:scale(.93)}
    .chip-active,.chip:hover{background:var(--gold);color:#000;border-color:var(--gold)}
    @media(max-width:360px){.stats-grid{grid-template-columns:1fr}.tab-btn{padding:7px 10px;font-size:12px}.card{padding:10px}}
  </style>
</head>
<body>
  <div class="header" style="position:sticky">
    <button class="refresh-btn" onclick="renderTab(currentTab);" title="Обновить">↻</button>
    <h1>DA BRO TAXI</h1>
    <div class="subtitle">Панель администратора</div>
    <div id="auth-status" class="loading">Авторизация...</div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="dashboard">Главная</button>
    <button class="tab-btn" data-tab="orders">Заказы</button>
    <button class="tab-btn" data-tab="drivers">Водители</button>
    <button class="tab-btn" data-tab="directions">Маршруты</button>
    <button class="tab-btn" data-tab="queue">Очередь</button>
    <button class="tab-btn" data-tab="proposals">Заявки</button>
    <button class="tab-btn" data-tab="payments">Оплаты</button>
    <button class="tab-btn" data-tab="audit">Журнал</button>
  </div>
  <div class="content" id="content"></div>
  <div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal"></div></div>
  <div class="toast" id="toast"></div>
<script>
var tg = window.Telegram.WebApp;
tg.ready();
try { tg.expand(); } catch(e){}
try { tg.setHeaderColor('#0d1117'); } catch(e){}
try { tg.setBackgroundColor('#0d1117'); } catch(e){}

var content = document.getElementById('content');
var statusEl = document.getElementById('auth-status');
var token = localStorage.getItem('admin_jwt') || '';
var cache = { orders: [], drivers: [], directions: [] };

function api(path, opts) {
  opts = opts || {};
  var headers = {
    'Content-Type': 'application/json',
    'Cache-Control': 'no-cache, no-store, must-revalidate',
    'Pragma': 'no-cache',
    'ngrok-skip-browser-warning': 'true'
  };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  opts.headers = headers;
  opts.cache = 'no-store';
  var method = (opts.method || 'GET').toUpperCase();
  var url = path;
  if (method === 'GET') {
    url += (path.indexOf('?') === -1 ? '?' : '&') + '_=' + Date.now();
  }
  return fetch(url, opts).then(function(r) {
    return r.text().then(function(text) {
      var data;
      try { data = JSON.parse(text); } catch(e) { data = text; }
      if (!r.ok) throw new Error(typeof data === 'object' ? (data.detail || JSON.stringify(data)) : String(data));
      return data;
    });
  });
}

function ensureArray(v) { return Array.isArray(v) ? v : []; }

function auth() {
  var initData = tg.initData || '';
  if (!initData) {
    statusEl.textContent = 'Откройте через Telegram';
    statusEl.className = 'err';
    return Promise.resolve(false);
  }
  return api('/api/auth/telegram', { method: 'POST', body: JSON.stringify({ init_data: initData }) })
    .then(function(res) {
      token = res.access_token;
      localStorage.setItem('admin_jwt', token);
      statusEl.textContent = 'Авторизовано';
      statusEl.className = 'ok';
      return true;
    })
    .catch(function(e) {
      statusEl.textContent = 'Ошибка: ' + e.message;
      statusEl.className = 'err';
      return false;
    });
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  if (msg.indexOf('Ошибка') !== -1) {
    t.style.borderColor = 'var(--danger)';
    t.style.color = 'var(--danger)';
  } else {
    t.style.borderColor = 'var(--border)';
    t.style.color = 'var(--text)';
  }
  t.classList.add('visible');
  setTimeout(function() { t.classList.remove('visible'); }, 4000);
}

function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('visible');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeModal();
});

var currentTab = 'dashboard';
document.getElementById('tabs').addEventListener('click', function(e) {
  var btn = e.target;
  if (!btn.classList.contains('tab-btn')) return;
  var all = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  btn.classList.add('active');
  currentTab = btn.getAttribute('data-tab');
  renderTab(currentTab);
});

function renderTab(tab) {
  content.innerHTML = '<div class="loader">Загрузка...</div>';
  var fn = {
    dashboard: renderDashboard,
    orders: renderOrders,
    drivers: renderDrivers,
    directions: renderDirections,
    queue: renderQueue,
    proposals: renderProposals,
    payments: renderPayments,
    audit: renderAudit
  };
  (fn[tab] || renderDashboard)();
}

function statusLabel(s) {
  var m = { new:'Новый', assigned:'Назначен', in_progress:'В пути', completed:'Завершён', admin_review:'На проверке', awaiting_payment:'Ждёт оплату', cancelled:'Отменён', pending:'Ожидает', confirmed:'Подтверждён', awaiting_admin:'Ждёт админа', active:'Активен', blocked:'Заблокирован', failed:'Ошибка', suggested:'Предложен' };
  return m[s] || s;
}
function fmtHours(min) {
  if (!min) return '0 ч';
  var h = min / 60;
  return (min % 60 === 0) ? (h + ' ч') : (h.toFixed(1) + ' ч');
}
function hoursToMin(h) { return Math.max(30, Math.round(parseFloat(h || '1') * 60)); }
function queueDriverStatus(q) {
  var parts = [];
  if (q.loading) parts.push('🟡 загрузка');
  if (q.in_trip) parts.push('🚗 в пути');
  if (q.rest_until) parts.push('😴 отдых');
  if (!q.online) parts.push('🔴 офлайн');
  return parts.length ? parts.join(', ') : '🟢 свободен';
}

function h(tag, cls, inner) { return '<' + tag + (cls ? ' class="' + cls + '"' : '') + '>' + (inner || '') + '</' + tag + '>'; }
function row(label, value) { return '<div class="row"><span class="lbl">' + label + '</span><span class="val">' + value + '</span></div>'; }
function badge(status) { return '<span class="badge b-' + status + '">' + statusLabel(status) + '</span>'; }
function cardStart(title, status) { return '<div class="card"><div class="card-header"><span class="card-title">' + title + '</span>' + (status ? badge(status) : '') + '</div>'; }
function cardEnd() { return '</div>'; }
function stat(num, label) { return '<div class="stat-card"><div class="num">' + num + '</div><div class="slbl">' + label + '</div></div>'; }

// Dashboard
function renderDashboard() {
  Promise.all([api('/api/admin/orders'), api('/api/admin/drivers'), api('/api/admin/directions')])
    .then(function(results) {
      var orders = ensureArray(results[0]);
      var drivers = ensureArray(results[1]);
      var directions = ensureArray(results[2]);
      cache.orders = orders; cache.drivers = drivers; cache.directions = directions;

      var newO = orders.filter(function(o){return o.status==='new'}).length;
      var needDrv = orders.filter(function(o){return o.suggestion}).length;
      var pendingDrv = drivers.filter(function(d){return d.status==='pending'}).length;
      var activeO = orders.filter(function(o){return o.status==='in_progress'}).length;
      var online = drivers.filter(function(d){return d.online}).length;
      var debt = drivers.reduce(function(s,d){return s + parseFloat(d.balance||0)}, 0);

      var html = '<div class="actions" style="margin-bottom:12px"><button class="btn btn-outline" onclick="downloadBackup()">💾 Бэкап БД</button></div>';
      html += '<div class="stats-grid">';
      html += stat(needDrv, 'Ждут водителя');
      html += stat(pendingDrv, 'Новые водители');
      html += stat(newO, 'Новые заказы');
      html += stat(activeO, 'В пути');
      html += stat(online, 'Онлайн');
      html += stat(debt.toFixed(0), 'Общий долг');
      html += '</div>';

      html += cardStart('Последние заказы');
      var recent = orders.slice(0, 5);
      if (recent.length === 0) html += '<div class="empty">Нет заказов</div>';
      for (var i = 0; i < recent.length; i++) {
        var o = recent[i];
        html += '<div class="row"><span class="lbl">#' + o.id + ' ' + o.from_location + ' → ' + o.to_location + '</span>' + badge(o.status) + '</div>';
      }
      html += cardEnd();

      html += cardStart('Маршруты');
      if (directions.length === 0) html += '<div class="empty">Нет маршрутов</div>';
      for (var j = 0; j < directions.length; j++) {
        var d = directions[j];
        html += row(d.from_label + ' → ' + d.to_label, d.enabled ? '✓ вкл' : '✗ выкл');
      }
      html += cardEnd();
      content.innerHTML = html;
    })
    .catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

// Orders
function renderOrders() {
  api('/api/admin/orders').then(function(data) {
    var orders = ensureArray(data);
    cache.orders = orders;
    if (orders.length === 0) { content.innerHTML = '<div class="empty">Заказов пока нет</div>'; return; }
    var html = '';
    for (var i = 0; i < orders.length; i++) {
      var o = orders[i];
      html += cardStart('Заказ #' + o.id, o.status);
      html += row('Маршрут', o.from_location + ' → ' + o.to_location);
      html += row('Мест', o.seats);
      html += row('Телефон', o.phone);
      html += row('Подача', (o.pickup_location || '—') + ' ' + (o.pickup_time_text || ''));
      if (o.suggestion) {
        var sg = o.suggestion;
        html += '<div style="margin:10px 0;padding:10px;background:rgba(245,197,24,.08);border:1px solid var(--gold-dim);border-radius:8px">';
        html += '<div style="font-size:12px;color:var(--gold);font-weight:600;margin-bottom:6px">🚗 Предложение системы</div>';
        html += row('Водитель', (sg.driver_name || 'ID:'+sg.driver_id) + (sg.driver_online ? ' 🟢' : ' 🔴'));
        html += '</div>';
        html += '<div class="actions">';
        html += '<button class="btn btn-success" onclick="showConfirmSuggestion(' + o.id + ')">✅ Подтвердить</button>';
        html += '<button class="btn btn-danger" onclick="doRejectSuggestion(' + o.id + ')">❌ Другой</button>';
        html += '<button class="btn btn-outline" onclick="showAssignModal(' + o.id + ',' + o.direction_id + ',' + o.seats + ')">Назначить вручную</button>';
        html += '</div>';
      } else if (o.status === 'new' || o.status === 'admin_review') {
        html += '<div class="actions"><button class="btn btn-gold" onclick="showAssignModal(' + o.id + ',' + o.direction_id + ',' + o.seats + ')">Назначить водителя</button></div>';
      }
      if (o.status === 'awaiting_payment') {
        html += '<div class="actions"><button class="btn btn-success" onclick="confirmPassengerPay(' + o.id + ')">Подтвердить оплату</button></div>';
      }
      if (o.status !== 'completed' && o.status !== 'cancelled') {
        html += '<div class="actions"><button class="btn btn-outline" onclick="showEditOrder(' + o.id + ')">✏️ Изменить</button>';
        html += '<button class="btn btn-danger" onclick="cancelOrder(' + o.id + ')">Отменить заказ</button></div>';
      }
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}


function cancelOrder(orderId) {
  if (!confirm('Отменить заказ #' + orderId + '?')) return;
  api('/api/admin/orders/' + orderId + '/cancel', { method: 'POST' })
    .then(function() { toast('Заказ отменён'); renderOrders(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function showEditOrder(orderId) {
  var o = (cache.orders || []).find(function(x) { return x.id === orderId; });
  if (!o) { toast('Заказ не найден'); return; }
  var esc = function(s) { return String(s || '').replace(/"/g, '&quot;'); };
  var html = '<h3>Заказ #' + orderId + '</h3>';
  html += '<div class="form-group"><label>Мест</label><input id="eo-seats" type="number" value="' + o.seats + '"/></div>';
  html += '<div class="form-group"><label>Откуда (подача)</label><input id="eo-from" value="' + esc(o.from_location) + '"/></div>';
  html += '<div class="form-group"><label>Куда</label><input id="eo-to" value="' + esc(o.to_location) + '"/></div>';
  html += '<div class="form-group"><label>Время подачи</label><input id="eo-time" value="' + esc(o.pickup_time_text) + '"/></div>';
  html += '<div class="actions"><button class="btn btn-gold" onclick="doEditOrder(' + orderId + ')">Сохранить</button>';
  html += '<button class="btn btn-outline" onclick="closeModal()">Отмена</button></div>';
  openModal(html);
}

function doEditOrder(orderId) {
  api('/api/admin/orders/' + orderId, {
    method: 'PATCH',
    body: JSON.stringify({
      seats: parseInt(document.getElementById('eo-seats').value) || 1,
      from_location: document.getElementById('eo-from').value.trim(),
      to_location: document.getElementById('eo-to').value.trim(),
      pickup_time_text: document.getElementById('eo-time').value.trim() || null
    })
  }).then(function() { closeModal(); toast('Заказ обновлён'); renderOrders(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function confirmPassengerPay(orderId) {
  api('/api/admin/orders/' + orderId + '/confirm-passenger-payment', { method: 'POST' })
    .then(function() { toast('Оплата подтверждена'); renderOrders(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function showAssignModal(orderId, directionId, seats) {
  openModal('<div class="loader">Загрузка водителей...</div>');
  api('/api/admin/drivers').then(function(data) {
    var drivers = ensureArray(data);
    cache.drivers = drivers;
    var eligible = drivers.filter(function(d) { return d.direction_id === directionId && d.status === 'active'; });
    var opts = '';
    for (var i = 0; i < eligible.length; i++) {
      var d = eligible[i];
      opts += '<option value="' + d.id + '">' + (d.full_name || 'ID:'+d.id) + ' (мест: ' + d.max_seats + ', ' + (d.online ? '🟢' : '🔴') + ')</option>';
    }
    var html = '<h3>Назначить на заказ #' + orderId + '</h3>';
    if (eligible.length === 0) {
      html += '<div style="padding:10px 0;color:var(--danger);font-size:13px">Нет доступных водителей на этом направлении</div>';
    }
    html += '<div class="form-group"><label>Водитель</label><select id="m-driver"><option value="">Выберите...</option>' + opts + '</select></div>';
    html += '<div class="form-group"><label>Место подачи</label><input id="m-pickup" placeholder="Адрес"/></div>';
    html += '<div class="form-group"><label>Время подачи</label><input id="m-time" type="time" value="' + _nearestTime() + '"/>';
    html += '<div class="chips">' + _timeChips() + '</div></div>';
    html += '<div class="actions"><button class="btn btn-gold" onclick="doAssign(' + orderId + ')">Назначить</button>';
    html += '<button class="btn btn-outline" onclick="closeModal()">Отмена</button></div>';
    openModal(html);
  }).catch(function(e) {
    openModal('<h3>Ошибка</h3><div style="color:var(--danger)">' + e.message + '</div><div class="actions"><button class="btn btn-outline" onclick="closeModal()">Закрыть</button></div>');
  });
}

function _nearestTime() {
  var now = new Date();
  var m = now.getMinutes();
  m = Math.ceil(m / 15) * 15;
  if (m >= 60) { now.setHours(now.getHours() + 1); m = 0; }
  var hh = String(now.getHours()).padStart(2, '0');
  var mm = String(m).padStart(2, '0');
  return hh + ':' + mm;
}

function _timeChips() {
  var times = ['через 10м', 'через 15м', 'через 30м', 'через 1ч'];
  var html = '';
  for (var i = 0; i < times.length; i++) {
    html += '<button class="chip" onclick="document.getElementById(\'m-time\').value=\'' + times[i] + '\';_highlightChip(this)">' + times[i] + '</button>';
  }
  return html;
}

function _highlightChip(el) {
  var siblings = el.parentNode.querySelectorAll('.chip');
  for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('chip-active');
  el.classList.add('chip-active');
}

function renderDrivers() {

    .then(function(results) {

        for (var pi = 0; pi < pendingList.length; pi++) {

          html += '<div class="actions"><button class="btn btn-success" onclick="showApproveDriver(' + pd.id + ')">✅ Подтвердить</button></div>';
        }
        html += cardEnd();
      }

        if (d.status === 'active') {
          html += '<button class="btn btn-gold" onclick="showChangeDirection(' + d.id + ',' + (d.direction_id || 'null') + ')">Направление</button>';
          html += '<button class="btn btn-outline" onclick="showEditDriver(' + d.id + ')">✏️ Параметры</button>';

        html += '</div>';
        html += cardEnd();

// Queue
function renderQueue() {
  api('/api/admin/directions/grouped').then(function(groups) {
    groups = ensureArray(groups);
    if (!groups.length) { content.innerHTML = '<div class="empty">Нет маршрутов</div>'; return; }
    var tasks = [];
    groups.forEach(function(g) {
      tasks.push({ g: g, leg: g.forward, label: 'Туда' });
      if (g.reverse) tasks.push({ g: g, leg: g.reverse, label: '↩' });
    });
    return Promise.all(tasks.map(function(tk) {
      return api('/api/admin/directions/' + tk.leg.id + '/queue').then(function(q) {
        return { tk: tk, q: ensureArray(q) };
      });
    })).then(function(rows) {
      var html = '';
      var lastG = null;
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        if (!lastG || lastG !== r.tk.g) {
          if (lastG) html += cardEnd();
          html += cardStart('🛣 ' + (r.tk.g.label || ''));
          lastG = r.tk.g;
        }
        html += '<div style="margin-top:8px;font-weight:600;color:var(--gold)">' + r.tk.label + ': ' + r.tk.leg.from_label + ' → ' + r.tk.leg.to_label + '</div>';
        var q = r.q;
        html += row('В очереди', q.length);
        for (var j = 0; j < q.length; j++) {
          var qq = q[j];
          var name = qq.full_name || ('#' + qq.driver_id);
          html += '<div class="row"><span class="lbl">' + (j+1) + '. ' + name + '</span><span class="val" style="font-size:11px">';
          html += queueDriverStatus(qq) + ' · мест:' + qq.own_seats_reserved;
          if (qq.loading_label) html += '<br/>⏱ ' + qq.loading_label;
          if (qq.car_info) html += '<br/>' + qq.car_info;
          if (j > 0) html += ' <button class="btn btn-outline" style="padding:4px 8px" onclick="moveQueue(' + r.tk.leg.id + ',' + j + ',-1)">↑</button>';
          if (j < q.length - 1) html += ' <button class="btn btn-outline" style="padding:4px 8px" onclick="moveQueue(' + r.tk.leg.id + ',' + j + ',1)">↓</button>';
          html += '</span></div>';
        }
      }
      if (lastG) html += cardEnd();
      content.innerHTML = html;
    });
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function moveQueue(directionId, index, delta) {
  api('/api/admin/directions/' + directionId + '/queue').then(function(q) {
    q = ensureArray(q);
    var ids = q.map(function(x) { return x.driver_id; });
    var ni = index + delta;
    if (ni < 0 || ni >= ids.length) return;
    var t = ids[index]; ids[index] = ids[ni]; ids[ni] = t;
    return api('/api/admin/directions/' + directionId + '/queue/reorder', {
      method: 'POST', body: JSON.stringify({ driver_ids: ids })
    });
  }).then(function() { toast('Очередь обновлена'); renderQueue(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

    if (proposals.length === 0) { content.innerHTML = '<div class="empty">Нет заявок на новые маршруты</div>'; return; }
    var html = '';
    for (var i = 0; i < proposals.length; i++) {
      var p = proposals[i];
      html += cardStart(p.from_label + ' → ' + p.to_label, 'pending');
      html += row('Время', fmtHours(p.estimated_time_min));
      html += row('Комментарий', p.comment || '—');
      html += row('Водитель', (p.proposer_name || '') + ' #' + p.proposer_id);
      html += row('Мест', p.max_seats + ' (своих: ' + p.own_seats + ')');
      html += row('Тариф', p.price_per_seat + ' + ' + p.fixed_price);
      html += '<div class="actions">';
      html += '<button class="btn btn-success" onclick="approveProposal(' + p.id + ')">Одобрить</button>';
      html += '<button class="btn btn-danger" onclick="rejectProposal(' + p.id + ')">Отклонить</button>';
      html += '</div>';
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function approveProposal(id) {
  api('/api/admin/proposals/' + id + '/approve', { method: 'POST', body: JSON.stringify({}) })
    .then(function(res) { toast('Маршрут создан (ID: ' + res.direction_id + ')'); renderProposals(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function rejectProposal(id) {
  var html = '<h3>Отклонить заявку #' + id + '</h3>';
  html += '<div class="form-group"><label>Причина (опционально)</label><input id="m-note"/></div>';
  html += '<div class="actions"><button class="btn btn-danger" onclick="doRejectProposal(' + id + ')">Отклонить</button>';
  html += '<button class="btn btn-outline" onclick="closeModal()">Отмена</button></div>';
  openModal(html);
}

function doRejectProposal(id) {
  var note = document.getElementById('m-note').value;
  api('/api/admin/proposals/' + id + '/reject', { method: 'POST', body: JSON.stringify({ note: note || null }) })
    .then(function() { closeModal(); toast('Заявка отклонена'); renderProposals(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

// Payments
function renderPayments() {
  api('/api/admin/payments').then(function(data) {
    var payments = ensureArray(data);
    if (payments.length === 0) { content.innerHTML = '<div class="empty">Нет платежей</div>'; return; }
    var html = '';
    for (var i = 0; i < payments.length; i++) {
      var p = payments[i];
      html += cardStart('Платёж #' + p.id, p.status);
      html += row('Водитель', '#' + p.driver_id);
      html += row('Сумма', p.amount + ' ₽');
      html += row('Провайдер', p.provider || '—');
      if (p.status === 'pending' || p.status === 'awaiting_admin') {
        html += '<div class="actions">';
        html += '<button class="btn btn-gold" onclick="checkPayment(' + p.id + ')">Проверить в ЮKассе</button>';
        html += '<button class="btn btn-success" onclick="showConfirmPayment(' + p.id + ',\'' + p.amount + '\')">Подтвердить</button>';
        html += '</div>';
      }
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function checkPayment(paymentId) {
  api('/api/admin/payments/' + paymentId + '/check', { method: 'POST' })
    .then(function(res) {
      if (res.status === 'confirmed' || res.status === 'already_confirmed') toast('Платёж подтверждён!');
      else if (res.status === 'canceled') toast('Платёж отменён');
      else toast('Статус: ' + res.status);
      renderPayments();
    }).catch(function(e) { toast('Ошибка: ' + e.message); });
}

function showConfirmPayment(paymentId, amount) {
  var html = '<h3>Подтвердить платёж #' + paymentId + '</h3>';
  html += '<div class="form-group"><label>Сумма (₽)</label><input id="m-amount" type="number" value="' + amount + '"/></div>';
  html += '<div class="actions"><button class="btn btn-success" onclick="doConfirmPayment(' + paymentId + ')">Подтвердить</button>';
  html += '<button class="btn btn-outline" onclick="closeModal()">Отмена</button></div>';
  openModal(html);
}

function doConfirmPayment(paymentId) {
  var amount = document.getElementById('m-amount').value;
  api('/api/admin/payments/' + paymentId + '/confirm', { method: 'POST', body: JSON.stringify({ amount: +amount }) })
    .then(function() { closeModal(); toast('Платёж подтверждён'); renderPayments(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}



function renderAudit() {
  api('/api/admin/audit?limit=80').then(function(rows) {
    rows = ensureArray(rows);
    if (!rows.length) { content.innerHTML = '<div class="empty">Пусто</div>'; return; }
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      var a = rows[i];
      html += cardStart(a.action, '');
      html += row('Когда', (a.created_at || '').slice(0, 19));
      html += row('Сущность', (a.entity_type || '') + ' #' + (a.entity_id || ''));
      if (a.actor_telegram_id) html += row('Актор TG', a.actor_telegram_id);
      if (a.payload) html += row('Детали', a.payload);
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function downloadBackup() {
  var headers = { 'Authorization': 'Bearer ' + token, 'ngrok-skip-browser-warning': 'true' };
  fetch('/api/admin/backup', { method: 'POST', headers: headers, cache: 'no-store' })
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.blob();
    })
    .then(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'taxi_backup_' + Date.now() + '.db';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('Бэкап скачан');
    })
    .catch(function(e) { toast('Ошибка бэкапа: ' + e.message); });
}

// Init
auth().then(function(ok) {
  if (ok !== false) {
    renderTab('dashboard');
  }
});
</script>

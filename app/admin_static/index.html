<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>DaBro Taxi — Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--border:#30363d;--gold:#f5c518;--gold-dim:#b8960f;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--danger:#f85149;--info:#58a6ff;--radius:12px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-text-size-adjust:100%}
    .header{background:linear-gradient(135deg,#1a1f2e 0%,#0d1117 100%);padding:16px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .header h1{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:1px}
    .header .subtitle{font-size:11px;color:var(--text-dim);margin-top:2px}
    #auth-status{font-size:12px;padding:6px 12px;margin-top:8px;border-radius:20px;display:inline-block}
    #auth-status.ok{background:rgba(63,185,80,.15);color:var(--success)}
    #auth-status.err{background:rgba(248,81,73,.15);color:var(--danger)}
    #auth-status.loading{background:rgba(245,197,24,.15);color:var(--gold)}
    .refresh-btn{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .refresh-btn:active{transform:scale(.9)}
    .tabs{display:flex;overflow-x:auto;gap:4px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:68px;z-index:99;-webkit-overflow-scrolling:touch}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;padding:8px 14px;border:none;border-radius:20px;background:var(--surface2);color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .tab-btn.active{background:var(--gold);color:#000;font-weight:600}
    .content{padding:12px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
    .card-title{font-size:14px;font-weight:600;color:var(--gold);word-break:break-word}
    .badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
    .b-new{background:rgba(88,166,255,.15);color:var(--info)}
    .b-assigned{background:rgba(245,197,24,.15);color:var(--gold)}
    .b-in_progress{background:rgba(63,185,80,.15);color:var(--success)}
    .b-completed{background:rgba(139,148,158,.15);color:var(--text-dim)}
    .b-admin_review{background:rgba(248,81,73,.15);color:var(--danger)}
    .b-pending{background:rgba(245,197,24,.15);color:var(--gold)}
    .b-active{background:rgba(63,185,80,.15);color:var(--success)}
    .b-blocked{background:rgba(248,81,73,.15);color:var(--danger)}
    .b-suspicious{background:rgba(255,140,0,.18);color:#ff8c00}
    .b-confirmed{background:rgba(63,185,80,.15);color:var(--success)}
    .b-awaiting_admin{background:rgba(245,197,24,.15);color:var(--gold)}
    .b-suggested{background:rgba(88,166,255,.15);color:var(--info)}
    .b-failed{background:rgba(248,81,73,.15);color:var(--danger)}
    .row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(48,54,61,.4)}
    .row:last-child{border-bottom:none}
    .row .lbl{color:var(--text-dim)}
    .row .val{color:var(--text);font-weight:500;text-align:right;max-width:60%;word-break:break-word}
    .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .btn{padding:9px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .btn:active{transform:scale(.95);opacity:.8}
    .btn-gold{background:var(--gold);color:#000}
    .btn-success{background:var(--success);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px}
    .form-group input,.form-group select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none}
    .form-group input:focus,.form-group select:focus{border-color:var(--gold)}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
    .stat-card .num{font-size:24px;font-weight:700;color:var(--gold)}
    .stat-card .slbl{font-size:11px;color:var(--text-dim);margin-top:4px}
    .empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
    .loader{text-align:center;padding:30px;color:var(--gold);font-size:14px}
    .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
    .modal-overlay.visible{display:flex}
    .modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal h3{color:var(--gold);margin-bottom:16px;font-size:16px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.visible{opacity:1}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .chip{padding:6px 14px;border:1px solid var(--border);border-radius:16px;background:var(--surface2);color:var(--text-dim);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .chip:active{transform:scale(.93)}
    .chip-active,.chip:hover{background:var(--gold);color:#000;border-color:var(--gold)}
    .driver-photos-section{margin:10px 0 12px}
    .driver-photos-title{font-size:12px;color:var(--text-dim);margin-bottom:8px;font-weight:600}
    .driver-photos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .driver-photo-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .driver-photo-item img{width:100%;height:100px;object-fit:cover;display:block;cursor:pointer}
    .driver-photo-label{font-size:10px;text-align:center;padding:4px;color:var(--text-dim)}
    .photo-viewer{display:none;position:fixed;inset:0;z-index:500;background:#000;flex-direction:column;-webkit-tap-highlight-color:transparent;pointer-events:none;visibility:hidden}
    .photo-viewer.visible{display:flex;pointer-events:auto;visibility:visible}
    .pv-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;padding-top:max(12px,env(safe-area-inset-top));flex-shrink:0}
    .pv-title{font-size:14px;font-weight:600;color:var(--gold)}
    .pv-counter{font-size:12px;color:var(--text-dim)}
    .pv-close{width:40px;height:40px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:20px;cursor:pointer}
    .pv-stage{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;align-items:center;justify-content:center;min-height:0;touch-action:pan-x pan-y pinch-zoom}
    .pv-stage img{max-width:min(100%,100vw);max-height:min(100%,70vh);object-fit:contain;transform-origin:center center;will-change:transform;user-select:none;-webkit-user-drag:none}
    .pv-toolbar{display:flex;gap:8px;justify-content:center;align-items:center;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0;flex-wrap:wrap}
    .pv-toolbar .btn{min-width:44px;padding:10px 14px}
    .users-search{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .users-search input{flex:1;min-width:140px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
    .users-table-wrap{overflow-x:auto;margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius)}
    .users-table{width:100%;border-collapse:collapse;font-size:12px;min-width:640px}
    .users-table th,.users-table td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--border)}
    .users-table th{color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase}
    .users-table tr:last-child td{border-bottom:none}
    .users-table tr.row-selected td{background:rgba(245,197,24,.08)}
    .user-detail-panel{margin-top:16px}
    .users-pager{display:flex;gap:8px;align-items:center;justify-content:center;margin:12px 0;flex-wrap:wrap}
    @media(max-width:360px){.stats-grid{grid-template-columns:1fr}.tab-btn{padding:7px 10px;font-size:12px}.card{padding:10px}.driver-photos-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="header" style="position:sticky">
    <button class="refresh-btn" onclick="renderTab(currentTab);" title="Обновить">↻</button>
    <h1>DA BRO TAXI</h1>
    <div class="subtitle">Панель администратора</div>
    <div id="auth-status" class="loading">Авторизация...</div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="dashboard">Главная</button>
    <button class="tab-btn" data-tab="orders">Заказы</button>
    <button class="tab-btn" data-tab="users">Пользователи</button>
    <button class="tab-btn" data-tab="drivers">Водители</button>
    <button class="tab-btn" data-tab="directions">Маршруты</button>
    <button class="tab-btn" data-tab="queue">Очередь</button>
    <button class="tab-btn" data-tab="proposals">Заявки</button>
    <button class="tab-btn" data-tab="calendar">Календарь</button>
    <button class="tab-btn" data-tab="payments">Оплаты</button>
    <button class="tab-btn" data-tab="audit">Журнал</button>
  </div>
  <div class="content" id="content"></div>
  <div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal"></div></div>
  <div class="photo-viewer" id="photo-viewer" aria-hidden="true">
    <div class="pv-top">
      <div><div class="pv-title" id="pv-label">Фото</div><div class="pv-counter" id="pv-counter"></div></div>
      <button type="button" class="pv-close" id="pv-close" aria-label="Закрыть">✕</button>
    </div>
    <div class="pv-stage" id="pv-stage"><img id="pv-img" alt=""/></div>
    <div class="pv-toolbar">
      <button type="button" class="btn btn-outline" id="pv-zoom-out">−</button>
      <button type="button" class="btn btn-outline" id="pv-zoom-reset">100%</button>
      <button type="button" class="btn btn-outline" id="pv-zoom-in">+</button>
      <button type="button" class="btn btn-gold" id="pv-prev">◀</button>
      <button type="button" class="btn btn-gold" id="pv-next">▶</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
<script>
var tg = window.Telegram.WebApp;
tg.ready();
try { tg.expand(); } catch(e){}
try { tg.setHeaderColor('#0d1117'); } catch(e){}
try { tg.setBackgroundColor('#0d1117'); } catch(e){}

var content = document.getElementById('content');
var statusEl = document.getElementById('auth-status');
var token = '';
var cache = { orders: [], drivers: [], directions: [] };
var pendingFulfillOrderId = null;
var usersPage = 1;
var usersSearchQ = '';
var selectedUserTgId = null;

var AUTH_ERRORS = {
  not_admin: 'Нет доступа. Добавьте ваш Telegram ID в ADMIN_TELEGRAM_IDS.',
  admin_not_configured: 'На сервере не задан ADMIN_TELEGRAM_IDS.',
  unknown_user: 'Сессия устарела. Обновите страницу.',
  invalid_token: 'Сессия устарела. Обновите страницу.',
  auth_failed: 'Ошибка входа на сервере. Смотрите логи API.',
  bad_init_data: 'Не прошла проверка Telegram. BOT_TOKEN должен быть от того же бота, из которого открыта админка.',
  bot_token_missing: 'На сервере не задан BOT_TOKEN в .env.',
  bad_response: 'Сервер вернул не JSON. Запущен ли API? MINI_APP_URL и ngrok должны вести на один домен.',
  ngrok_html: 'Ngrok отдал HTML вместо API. Перезапустите туннель или откройте админку снова.',
  internal_server_error: 'Ошибка сервера. Перезапустите API и попробуйте снова.'
};

var API_ERRORS = {
  direction_mismatch: 'Водитель на другом направлении. Назначьте вручную или нажмите «Другой».',
  capacity_exceeded: 'Недостаточно свободных мест у водителя.',
  driver_offline: 'Водитель не в сети.',
  no_suggestion: 'Нет предложения системы. Обновите список.',
  direction_required: 'Выберите направление при подтверждении водителя.',
  order_not_splittable: 'Разделить можно только новый заказ или на проверке.',
  invalid_split_seats: 'Укажите число мест меньше текущего (минимум 1).'
};

function authErrorLabel(detail) {
  if (!detail) return 'Ошибка авторизации';
  var key = String(detail);
  return API_ERRORS[key] || AUTH_ERRORS[key] || key;
}

function pluralZayavki(n) {
  n = Math.abs(parseInt(n, 10) || 0) % 100;
  var n1 = n % 10;
  if (n > 10 && n < 20) return 'заявок';
  if (n1 > 1 && n1 < 5) return 'заявки';
  if (n1 === 1) return 'заявка';
  return 'заявок';
}

function clearAuthToken() {
  token = '';
  localStorage.removeItem('admin_jwt');
}

function apiUrl(path, method) {
  var sep = path.indexOf('?') === -1 ? '?' : '&';
  var url = path + sep + 'ngrok-skip-browser-warning=1';
  if ((method || 'GET').toUpperCase() === 'GET') {
    url += '&_=' + Date.now();
  }
  return url;
}

function api(path, opts) {
  opts = opts || {};
  var headers = {
    'Content-Type': 'application/json',
    'Cache-Control': 'no-cache, no-store, must-revalidate',
    'Pragma': 'no-cache',
    'ngrok-skip-browser-warning': 'true'
  };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  opts.headers = headers;
  opts.cache = 'no-store';
  var method = (opts.method || 'GET').toUpperCase();
  return fetch(apiUrl(path, method), opts).then(function(r) {
    return r.text().then(function(text) {
      var data;
      try { data = JSON.parse(text); } catch(e) { data = null; }
      if (data === null) {
        if (text && (text.indexOf('<!DOCTYPE') !== -1 || text.indexOf('<html') !== -1)) {
          throw new Error('ngrok_html');
        }
        throw new Error('bad_response');
      }
      if (!r.ok) {
        var detail = data.detail || null;
        if (r.status === 401 && (detail === 'unknown_user' || detail === 'invalid_token')) {
          clearAuthToken();
        }
        throw new Error(authErrorLabel(detail || (r.status === 500 ? 'internal_server_error' : String(text))));
      }
      return data;
    });
  });
}

function ensureArray(v) { return Array.isArray(v) ? v : []; }

function auth() {
  clearAuthToken();
  var initData = tg.initData || '';
  if (!initData) {
    statusEl.textContent = 'Откройте через Telegram (кнопка «Админка» в боте)';
    statusEl.className = 'err';
    return Promise.resolve(false);
  }
  return api('/api/auth/telegram', { method: 'POST', body: JSON.stringify({ init_data: initData }) })
    .then(function(res) {
      if (!res || !res.access_token) {
        throw new Error('bad_response');
      }
      token = res.access_token;
      localStorage.setItem('admin_jwt', token);
      statusEl.textContent = 'Авторизовано';
      statusEl.className = 'ok';
      return true;
    })
    .catch(function(e) {
      clearAuthToken();
      statusEl.textContent = authErrorLabel(e.message);
      statusEl.className = 'err';
      return false;
    });
}

var PHOTO_KIND_LABELS = { front: 'Спереди', back: 'Сзади', left: 'Слева', right: 'Справа', salon: 'Салон 1', salon2: 'Салон 2' };

function photoKindLabel(kind) {
  return PHOTO_KIND_LABELS[kind] || kind;
}

function escapeHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function esc(s) {
  return escapeHtml(s);
}

function isDriverRegistrationComplete(d) {
  if (d.registration_submitted === true) return true;
  if (d.registration_submitted === false) return false;
  return !!(d.phone && d.full_name && d.car_info);
}

function fetchAuthBlob(path) {
  var headers = { 'Authorization': 'Bearer ' + token, 'ngrok-skip-browser-warning': 'true' };
  return fetch(apiUrl(path, 'GET'), { headers: headers, cache: 'no-store' }).then(function(r) {
    if (!r.ok) throw new Error('photo_load_failed');
    return r.blob();
  });
}

var pvState = { items: [], index: 0, scale: 1 };

function pvApplyZoom() {
  var img = document.getElementById('pv-img');
  if (img) img.style.transform = 'scale(' + pvState.scale + ')';
  var resetBtn = document.getElementById('pv-zoom-reset');
  if (resetBtn) resetBtn.textContent = Math.round(pvState.scale * 100) + '%';
}

function pvRenderImage() {
  if (!pvState.items.length) return;
  var it = pvState.items[pvState.index];
  var img = document.getElementById('pv-img');
  var stage = document.getElementById('pv-stage');
  img.src = it.src;
  img.alt = photoKindLabel(it.kind);
  document.getElementById('pv-label').textContent = photoKindLabel(it.kind);
  document.getElementById('pv-counter').textContent = (pvState.index + 1) + ' / ' + pvState.items.length;
  pvState.scale = 1;
  pvApplyZoom();
  if (stage) stage.scrollTop = 0;
}

function openPhotoViewer(items, index) {
  if (!items || !items.length) return;
  pvState.items = items;
  pvState.index = Math.max(0, Math.min(index || 0, items.length - 1));
  pvRenderImage();
  var el = document.getElementById('photo-viewer');
  el.classList.add('visible');
  el.setAttribute('aria-hidden', 'false');
}

function closePhotoViewer() {
  var el = document.getElementById('photo-viewer');
  if (!el) return;
  el.classList.remove('visible');
  el.setAttribute('aria-hidden', 'true');
  var img = document.getElementById('pv-img');
  if (img) img.removeAttribute('src');
}

function pvZoom(delta) {
  pvState.scale = Math.min(5, Math.max(0.5, +(pvState.scale + delta).toFixed(2)));
  pvApplyZoom();
}

function pvPrev() {
  if (pvState.items.length < 2) return;
  pvState.index = (pvState.index - 1 + pvState.items.length) % pvState.items.length;
  pvRenderImage();
}

function pvNext() {
  if (pvState.items.length < 2) return;
  pvState.index = (pvState.index + 1) % pvState.items.length;
  pvRenderImage();
}

(function initPhotoViewer() {
  try {
  var pvClose = document.getElementById('pv-close');
  if (!pvClose) return;
  pvClose.addEventListener('click', closePhotoViewer);
  document.getElementById('pv-zoom-in').addEventListener('click', function() { pvZoom(0.35); });
  document.getElementById('pv-zoom-out').addEventListener('click', function() { pvZoom(-0.35); });
  document.getElementById('pv-zoom-reset').addEventListener('click', function() { pvState.scale = 1; pvApplyZoom(); });
  document.getElementById('pv-prev').addEventListener('click', pvPrev);
  document.getElementById('pv-next').addEventListener('click', pvNext);
  var stage = document.getElementById('pv-stage');
  var img = document.getElementById('pv-img');
  if (!stage || !img) return;
  var lastTap = 0;
  img.addEventListener('dblclick', function(e) {
    e.preventDefault();
    if (pvState.scale > 1.1) { pvState.scale = 1; } else { pvState.scale = 2.5; }
    pvApplyZoom();
  });
  stage.addEventListener('click', function(e) {
    if (e.target === stage) closePhotoViewer();
  });
  var touchStartDist = 0;
  var touchStartScale = 1;
  var swipeX = null;
  stage.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      touchStartDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      touchStartScale = pvState.scale;
      swipeX = null;
    } else if (e.touches.length === 1) {
      swipeX = e.touches[0].clientX;
      var now = Date.now();
      if (now - lastTap < 300) {
        if (pvState.scale > 1.1) { pvState.scale = 1; } else { pvState.scale = 2.5; }
        pvApplyZoom();
      }
      lastTap = now;
    }
  }, { passive: true });
  stage.addEventListener('touchmove', function(e) {
    if (e.touches.length !== 2 || !touchStartDist) return;
    var dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pvState.scale = Math.min(5, Math.max(0.5, touchStartScale * (dist / touchStartDist)));
    pvApplyZoom();
  }, { passive: true });
  stage.addEventListener('touchend', function(e) {
    if (swipeX != null && e.changedTouches.length && touchStartDist === 0) {
      var dx = e.changedTouches[0].clientX - swipeX;
      if (Math.abs(dx) >= 60 && pvState.scale <= 1.2) {
        if (dx < 0) pvNext(); else pvPrev();
      }
    }
    swipeX = null;
    touchStartDist = 0;
  });
  stage.addEventListener('wheel', function(e) {
    if (!document.getElementById('photo-viewer').classList.contains('visible')) return;
    e.preventDefault();
    pvZoom(e.deltaY < 0 ? 0.2 : -0.2);
  }, { passive: false });
  document.addEventListener('keydown', function(e) {
    var viewer = document.getElementById('photo-viewer');
    if (!viewer.classList.contains('visible')) return;
    if (e.key === 'Escape') closePhotoViewer();
    if (e.key === 'ArrowLeft') pvPrev();
    if (e.key === 'ArrowRight') pvNext();
    if (e.key === '+' || e.key === '=') pvZoom(0.35);
    if (e.key === '-') pvZoom(-0.35);
  });
  } catch (e) {
    console.warn('photo viewer init failed', e);
  }
})();

function bindPhotoThumbs(container, items) {
  container._photoItems = items;
  var thumbs = container.querySelectorAll('.js-photo-thumb');
  for (var i = 0; i < thumbs.length; i++) {
    (function(idx) {
      thumbs[idx].addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        openPhotoViewer(container._photoItems, idx);
      });
    })(i);
  }
}

function loadDriverPhotoGallery(driverId, containerId) {
  var container = document.getElementById(containerId);
  if (!container) return;
  if (container._photoBlobUrls) {
    for (var u = 0; u < container._photoBlobUrls.length; u++) {
      try { URL.revokeObjectURL(container._photoBlobUrls[u]); } catch (e) {}
    }
  }
  container._photoBlobUrls = [];
  container.innerHTML = '<div class="driver-photos-title">📷 Фото автомобиля</div><div class="loader" style="padding:12px">Загрузка...</div>';
  api('/api/admin/drivers/' + driverId + '/photos').then(function(photos) {
    photos = ensureArray(photos);
    if (!photos.length) {
      container.innerHTML = '<div class="driver-photos-title">📷 Фото автомобиля</div><span style="color:var(--text-dim);font-size:12px">Фото не загружены (водитель регистрировался до обновления или не прислал)</span>';
      return;
    }
    return Promise.all(photos.map(function(p) {
      return fetchAuthBlob(p.url).then(function(blob) {
        var src = URL.createObjectURL(blob);
        container._photoBlobUrls.push(src);
        return { kind: p.kind, src: src };
      });
    })).then(function(items) {
      if (!document.getElementById(containerId)) return;
      var html = '<div class="driver-photos-title">📷 Фото автомобиля (' + items.length + ')</div><div class="driver-photos-grid">';
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        html += '<div class="driver-photo-item"><img class="js-photo-thumb" src="' + escapeHtml(it.src) + '" alt="' + escapeHtml(photoKindLabel(it.kind)) + '"/><div class="driver-photo-label">' + escapeHtml(photoKindLabel(it.kind)) + '</div></div>';
      }
      html += '</div>';
      container.innerHTML = html;
      bindPhotoThumbs(container, items);
    });
  }).catch(function() {
    if (!document.getElementById(containerId)) return;
    container.innerHTML = '<div class="driver-photos-title">📷 Фото автомобиля</div><span style="color:var(--danger);font-size:12px">Не удалось загрузить фото</span>';
  });
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  if (msg.indexOf('Ошибка') !== -1) {
    t.style.borderColor = 'var(--danger)';
    t.style.color = 'var(--danger)';
  } else {
    t.style.borderColor = 'var(--border)';
    t.style.color = 'var(--text)';
  }
  t.classList.add('visible');
  setTimeout(function() { t.classList.remove('visible'); }, 4000);
}

function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('visible');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {

});

var currentTab = 'dashboard';
document.getElementById('tabs').addEventListener('click', function(e) {

  };

function statusLabel(s) {
  var m = { new:'Новый', awaiting_scheduled_trip:'Ждёт рейса', assigned:'Назначен', in_progress:'В пути', completed:'Завершён', admin_review:'На проверке', awaiting_payment:'Ждёт оплату', cancelled:'Отменён', pending:'Ожидает', reserved:'В резерве', confirmed:'Подтверждён', awaiting_admin:'Ждёт админа', active:'Активен', suspicious:'На проверке', blocked:'Заблокирован', failed:'Ошибка', suggested:'Предложен' };
  return m[s] || s;
}
function fmtHours(min) {
  if (!min) return '0 ч';
  var h = min / 60;
  return (min % 60 === 0) ? (h + ' ч') : (h.toFixed(1) + ' ч');
}
function hoursToMin(h) { return Math.max(30, Math.round(parseFloat(h || '1') * 60)); }
function queueDriverStatus(q) {
  var parts = [];
  if (q.loading) parts.push('🟡 загрузка');
  if (q.in_trip) parts.push('🚗 в пути');
  if (q.rest_until) parts.push('😴 отдых');
  if (!q.online) parts.push('🔴 офлайн');
  return parts.length ? parts.join(', ') : '🟢 свободен';
}

function h(tag, cls, inner) { return '<' + tag + (cls ? ' class="' + cls + '"' : '') + '>' + (inner || '') + '</' + tag + '>'; }
function row(label, value) { return '<div class="row"><span class="lbl">' + label + '</span><span class="val">' + value + '</span></div>'; }
function tgLink(tid, label) {
  if (!tid) return esc(label || '—');
  return '<a href="tg://user?id=' + tid + '" style="color:var(--info)">' + esc(label || ('TG ' + tid)) + '</a>';
}
function badge(status) { return '<span class="badge b-' + status + '">' + statusLabel(status) + '</span>'; }
function cardStart(title, status) { return '<div class="card"><div class="card-header"><span class="card-title">' + title + '</span>' + (status ? badge(status) : '') + '</div>'; }
function cardEnd() { return '</div>'; }
function stat(num, label) { return '<div class="stat-card"><div class="num">' + num + '</div><div class="slbl">' + label + '</div></div>'; }

// Dashboard
function renderDashboard() {
  Promise.all([api('/api/admin/orders'), api('/api/admin/drivers'), api('/api/admin/directions')])
    .then(function(results) {
      var orders = ensureArray(results[0]);
      var drivers = ensureArray(results[1]);
      var directions = ensureArray(results[2]);
      cache.orders = orders; cache.drivers = drivers; cache.directions = directions;

      var newO = orders.filter(function(o){return o.status==='new'}).length;
      var needDrv = orders.filter(function(o){return o.suggestion}).length;
      var pendingDrv = drivers.filter(function(d){return d.status==='pending'}).length;
      var suspiciousDrv = drivers.filter(function(d){return d.status==='suspicious'}).length;
      var activeO = orders.filter(function(o){return o.status==='in_progress'}).length;
      var online = drivers.filter(function(d){return d.online}).length;
      var debt = drivers.reduce(function(s,d){return s + parseFloat(d.balance||0)}, 0);

      var html = '<div class="actions" style="margin-bottom:12px"><button class="btn btn-outline" onclick="sendBackup()">💾 Бэкап в Telegram</button></div>';
      html += '<div class="stats-grid">';
      html += stat(needDrv, 'Ждут водителя');
      html += stat(pendingDrv, 'Новые водители');
      html += stat(suspiciousDrv, 'На проверке');
      html += stat(newO, 'Новые заказы');
      html += stat(activeO, 'В пути');
      html += stat(online, 'Онлайн');
      html += stat(debt.toFixed(0), 'Общий долг');
      html += '</div>';

      html += cardStart('Последние заказы');
      var recent = orders.slice(0, 5);
      if (recent.length === 0) html += '<div class="empty">Нет заказов</div>';
      for (var i = 0; i < recent.length; i++) {
        var o = recent[i];
        html += '<div class="row"><span class="lbl">#' + o.id + ' ' + o.from_location + ' → ' + o.to_location + '</span>' + badge(o.status) + '</div>';
      }
      html += cardEnd();

      html += cardStart('Маршруты');
      if (directions.length === 0) html += '<div class="empty">Нет маршрутов</div>';
      for (var j = 0; j < directions.length; j++) {
        var d = directions[j];
        html += row(d.from_label + ' → ' + d.to_label, d.enabled ? '✓ вкл' : '✗ выкл');
      }
      html += cardEnd();
      content.innerHTML = html;
    })
    .catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

// Orders
function renderOrders() {
  api('/api/admin/orders').then(function(data) {
    var orders = ensureArray(data);
    cache.orders = orders;
    if (orders.length === 0) { content.innerHTML = '<div class="empty">Заказов пока нет</div>'; return; }
    var html = '';
    for (var i = 0; i < orders.length; i++) {
      var o = orders[i];
      html += cardStart('Заказ #' + o.id, o.status);
      html += row('Маршрут', o.from_location + ' → ' + o.to_location);
      html += row('Мест', o.seats);
      html += row('Телефон', o.phone);
      html += row('Подача', (o.pickup_location || '—') + ' ' + (o.pickup_time_text || ''));
      if (o.status === 'admin_review') {
        html += '<div style="margin:8px 0;padding:8px;background:rgba(248,81,73,.1);border-radius:8px;font-size:12px;color:var(--danger)">';
        html += '🆘 Перебор: не влезает в одну машину. Назначьте вручную или разделите заказ.';
        html += '</div>';
      }
      if (o.suggestion) {
        var sg = o.suggestion;
        var dirOk = sg.direction_match !== false;
        html += '<div style="margin:10px 0;padding:10px;background:rgba(245,197,24,.08);border:1px solid var(--gold-dim);border-radius:8px">';
        html += '<div style="font-size:12px;color:var(--gold);font-weight:600;margin-bottom:6px">🚗 Предложение системы</div>';
        html += row('Водитель', (sg.driver_name || 'ID:'+sg.driver_id) + (sg.driver_online ? ' 🟢' : ' 🔴'));
        if (sg.order_direction_label) html += row('Заказ', sg.order_direction_label);
        if (sg.driver_direction_label) html += row('Водитель на', sg.driver_direction_label);
        if (!dirOk) {
          html += '<div style="font-size:12px;color:var(--danger);margin-top:6px">⚠️ Направления не совпадают — подтверждение недоступно</div>';
        }
        html += '</div>';
        html += '<div class="actions">';
        if (dirOk) {
          html += '<button class="btn btn-success" onclick="showConfirmSuggestion(' + o.id + ')">✅ Подтвердить</button>';
        }
        html += '<button class="btn btn-danger" onclick="doRejectSuggestion(' + o.id + ')">❌ Другой</button>';
        html += '<button class="btn btn-outline" onclick="showAssignModal(' + o.id + ',' + o.direction_id + ',' + o.seats + ')">Назначить вручную</button>';
        html += '</div>';
      } else if (o.status === 'new' || o.status === 'admin_review') {
        html += '<div class="actions"><button class="btn btn-gold" onclick="showAssignModal(' + o.id + ',' + o.direction_id + ',' + o.seats + ')">Назначить водителя</button>';
        if (o.status === 'admin_review' && o.seats > 1) {
          html += '<button class="btn btn-outline" onclick="showSplitOrder(' + o.id + ',' + o.seats + ')">✂️ Разделить места</button>';
        }
        html += '</div>';
      }
      if (o.status === 'awaiting_payment') {
        html += '<div class="actions"><button class="btn btn-success" onclick="confirmPassengerPay(' + o.id + ')">Подтвердить оплату</button></div>';
      }
      if (o.status !== 'completed' && o.status !== 'cancelled') {
        html += '<div class="actions"><button class="btn btn-outline" onclick="showOrderTimeline(' + o.id + ')">📋 Этапы</button>';
        html += '<button class="btn btn-outline" onclick="showEditOrder(' + o.id + ')">✏️ Изменить</button>';
        if (o.status === 'assigned' || o.status === 'admin_review' || o.status === 'in_progress') {
          html += '<button class="btn btn-outline" onclick="doUnassign(' + o.id + ')">Снять водителя</button>';
          html += '<button class="btn btn-gold" onclick="showReassignModal(' + o.id + ',' + o.direction_id + ')">Переназначить</button>';
        }
        html += '<button class="btn btn-danger" onclick="cancelOrder(' + o.id + ')">Отменить заказ</button></div>';
      }
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

    .then(function() { toast('Оплата подтверждена'); renderOrders(); })

function showAssignModal(orderId, directionId, seats) {
  openModal('<div class="loader">Загрузка водителей...</div>');
  api('/api/admin/drivers').then(function(data) {
    var drivers = ensureArray(data);
    cache.drivers = drivers;
    var eligible = drivers.filter(function(d) {
      if (d.direction_id !== directionId || d.status !== 'active') return false;
      var cap = (d.max_seats || 0) - (d.own_seats_reserved || 0);
      return cap >= seats;
    });
    var opts = '';
    for (var i = 0; i < eligible.length; i++) {
      var d = eligible[i];
      var cap = (d.max_seats || 0) - (d.own_seats_reserved || 0);
      opts += '<option value="' + d.id + '">' + (d.full_name || 'ID:'+d.id) + ' (до ' + cap + ' мест, ' + (d.online ? '🟢' : '🔴') + ')</option>';
    }
    var html = '<h3>Назначить на заказ #' + orderId + '</h3>';
    if (eligible.length === 0) {
      html += '<div style="padding:10px 0;color:var(--danger);font-size:13px">Нет доступных водителей на этом направлении</div>';
    }
    html += '<div class="form-group"><label>Водитель</label><select id="m-driver"><option value="">Выберите...</option>' + opts + '</select></div>';
    html += '<div class="form-group"><label>Место подачи</label><input id="m-pickup" placeholder="Адрес"/></div>';
    html += '<div class="form-group"><label>Время подачи</label><input id="m-time" type="time" value="' + _nearestTime() + '"/>';
    html += '<div class="chips">' + _timeChips() + '</div></div>';
    html += '<div class="actions"><button class="btn btn-gold" onclick="doAssign(' + orderId + ')">Назначить</button>';
    html += '<button class="btn btn-outline" onclick="closeModal()">Отмена</button></div>';
    openModal(html);
  }).catch(function(e) {
    openModal('<h3>Ошибка</h3><div style="color:var(--danger)">' + e.message + '</div><div class="actions"><button class="btn btn-outline" onclick="closeModal()">Закрыть</button></div>');
  });
}

function _nearestTime() {
  var now = new Date();
  var m = now.getMinutes();
  m = Math.ceil(m / 15) * 15;
  if (m >= 60) { now.setHours(now.getHours() + 1); m = 0; }
  var hh = String(now.getHours()).padStart(2, '0');
  var mm = String(m).padStart(2, '0');
  return hh + ':' + mm;
}

function _timeChips() {
  var times = ['через 10м', 'через 15м', 'через 30м', 'через 1ч'];
  var html = '';
  for (var i = 0; i < times.length; i++) {
    html += '<button class="chip" onclick="document.getElementById(\'m-time\').value=\'' + times[i] + '\';_highlightChip(this)">' + times[i] + '</button>';
  }
  return html;
}

function _highlightChip(el) {
  var siblings = el.parentNode.querySelectorAll('.chip');
  for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('chip-active');
  el.classList.add('chip-active');
}

function showConfirmSuggestion(orderId) {
  var html = '<h3>Подтвердить водителя для #' + orderId + '</h3>';
  html += '<div class="form-group"><label>Место подачи</label><input id="m-sg-pickup" placeholder="Адрес"/></div>';
  html += '<div class="form-group"><label>Время подачи</label><input id="m-sg-time" type="time" value="' + _nearestTime() + '"/>';
  html += '<div class="chips">' + _timeChips().replace(/m-time/g, 'm-sg-time') + '</div></div>';
  html += '<div class="actions"><button class="btn btn-success" onclick="doConfirmSuggestion(' + orderId + ')">Подтвердить</button>';
  html += '<button class="btn btn-outline" onclick="closeModal()">Отмена</button></div>';
  openModal(html);

// Drivers
function renderDrivers() {
  Promise.all([api('/api/admin/drivers'), api('/api/admin/directions')])
    .then(function(results) {
      var drivers = ensureArray(results[0]);
      var directions = ensureArray(results[1]);
      cache.drivers = drivers; cache.directions = directions;
      if (drivers.length === 0) { content.innerHTML = '<div class="empty">Нет водителей</div>'; return; }
      var pendingList = drivers.filter(function(d){
        return d.status === 'pending' && isDriverRegistrationComplete(d);
      });
      var draftList = drivers.filter(function(d){
        return d.status === 'pending' && !isDriverRegistrationComplete(d);
      });
      var suspiciousList = drivers.filter(function(d){ return d.status === 'suspicious'; });
      var html = '';
      if (suspiciousList.length > 0) {
        html += cardStart('⚠️ Подозрительные / кассовые (' + suspiciousList.length + ')', 'suspicious');
        for (var si = 0; si < suspiciousList.length; si++) {
          var sd = suspiciousList[si];
          html += row(sd.full_name || 'ID:' + sd.id, 'TG ' + sd.telegram_id);
          html += row('30 дн.', 'отказов ' + (sd.declines_30d||0) + ', отмен ' + (sd.order_cancellations_30d||0) + ', рейсов ' + (sd.trips_completed_30d||0));
          html += row('Риск', sd.risk_label || '—');
          html += '<div class="actions"><button class="btn btn-success" onclick="clearSuspicious(' + sd.id + ')">Снять проверку</button>';
          html += '<button class="btn btn-danger" onclick="blockDriver(' + sd.id + ')">Заблокировать</button></div>';
        }
        html += cardEnd();
      }
      if (draftList.length > 0) {
        html += cardStart('📝 Незавершённые анкеты (' + draftList.length + ')', 'awaiting_admin');
        for (var di = 0; di < draftList.length; di++) {
          var dd = draftList[di];
          html += row(dd.full_name || 'ID:' + dd.id, 'TG ' + dd.telegram_id);
          if (dd.draft_route) html += row('Маршрут', dd.draft_route);
          html += row('Статус', 'водитель ещё заполняет форму в боте');
        }
        html += cardEnd();
      }
      if (pendingList.length > 0) {
        html += cardStart('⏳ Подтвердить водителей (' + pendingList.length + ')', 'pending');
        for (var pi = 0; pi < pendingList.length; pi++) {
          var pd = pendingList[pi];
          html += row(pd.full_name || 'ID:' + pd.id, 'TG ' + pd.telegram_id);
          if (pd.draft_route) html += row('Маршрут', pd.draft_route);
          if (pd.phone) html += row('Телефон', pd.phone);
          if (pd.car_info) html += row('Авто', pd.car_info);
          html += row('Мест', pd.max_seats + ' (своих: ' + (pd.own_seats_reserved || 0) + ')');
          html += '<div class="actions"><button class="btn btn-outline" onclick="showApproveDriver(' + pd.id + ')">📷 Фото и подтверждение</button>';
          html += '<button class="btn btn-success" onclick="showApproveDriver(' + pd.id + ')">✅ Подтвердить</button></div>';
        }
        html += cardEnd();
      }
      for (var i = 0; i < drivers.length; i++) {
        var d = drivers[i];
        var dir = null;
        for (var j = 0; j < directions.length; j++) { if (directions[j].id === d.direction_id) { dir = directions[j]; break; } }
        var dirName = dir ? (dir.from_label + ' → ' + dir.to_label) : '—';
        html += cardStart(d.full_name || 'Без имени (ID:' + d.id + ')', d.status);
        html += row('TG ID', tgLink(d.telegram_id, 'TG ' + d.telegram_id));
        html += row('Направление', dirName);
        html += row('Макс. мест', d.max_seats);
        html += row('Долг', d.balance + ' ₽');
        html += row('Свои места', d.own_seats_reserved);
        html += row('Онлайн', d.online ? '🟢 Да' : '🔴 Нет');
        html += row('Загрузка', d.loading ? 'да' : 'нет');
        if (d.rest_until) html += row('Отдых до', d.rest_until);
        if (d.declines_30d || d.order_cancellations_30d) {
          html += row('30 дн.', 'отказов ' + (d.declines_30d||0) + ', отмен ' + (d.order_cancellations_30d||0) + ', рейсов ' + (d.trips_completed_30d||0));
        }
        if (d.risk_label && d.risk_label !== 'ok') html += row('Риск', d.risk_label);
        html += '<div class="actions">';
        if (d.status === 'pending') {
          html += '<button class="btn btn-outline" onclick="showApproveDriver(' + d.id + ')">📷 Фото</button>';
          html += '<button class="btn btn-success" onclick="showApproveDriver(' + d.id + ')">Подтвердить</button>';
        }
        if (d.status === 'active') {
          html += '<button class="btn btn-gold" onclick="showChangeDirection(' + d.id + ',' + (d.direction_id || 'null') + ')">Направление</button>';
          html += '<button class="btn btn-outline" onclick="showEditDriver(' + d.id + ')">✏️ Параметры</button>';
          html += '<button class="btn btn-outline" onclick="markSuspicious(' + d.id + ')">На проверку</button>';
          html += '<button class="btn btn-danger" onclick="blockDriver(' + d.id + ')">Блокировать</button>';
        }
        if (d.status === 'suspicious') {
          html += '<button class="btn btn-success" onclick="clearSuspicious(' + d.id + ')">Снять проверку</button>';
          html += '<button class="btn btn-gold" onclick="showChangeDirection(' + d.id + ',' + (d.direction_id || 'null') + ')">Направление</button>';
          html += '<button class="btn btn-danger" onclick="blockDriver(' + d.id + ')">Заблокировать</button>';
        }
        if (d.status === 'blocked') html += '<button class="btn btn-success" onclick="showApproveDriver(' + d.id + ')">Разблокировать</button>';
        html += '</div>';
        html += cardEnd();
      }
      if (!pendingList.length && !draftList.length && !suspiciousList.length) {
        html = '<div class="empty">Нет водителей на проверке. Новые анкеты появятся здесь после завершения регистрации в боте.</div>' + html;
      }
      content.innerHTML = html;
    }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

// Directions
function renderDirections() {
  Promise.all([api('/api/admin/directions'), api('/api/admin/directions/grouped')]).then(function(res) {
    var directions = ensureArray(res[0]);
    var groups = ensureArray(res[1]);
    cache.directions = directions;
    var html = '<div class="actions" style="margin-bottom:12px"><button class="btn btn-gold" onclick="showCreateDirection()">+ Новый маршрут</button></div>';
    if (!groups.length) { html += '<div class="empty">Нет маршрутов</div>'; content.innerHTML = html; return; }
    for (var gi = 0; gi < groups.length; gi++) {
      var g = groups[gi];
      html += cardStart('🛣 ' + (g.label || ''), 'active');
      var legs = [g.forward];
      if (g.reverse) legs.push(g.reverse);
      for (var li = 0; li < legs.length; li++) {
        var leg = legs[li];
        var d = directions.find(function(x) { return x.id === leg.id; });
        if (!d) d = leg;
        html += '<div style="margin:8px 0;padding:8px;border-left:2px solid var(--gold-dim)">';
        html += row(li === 0 ? 'Туда' : '↩ Обратно', d.from_label + ' → ' + d.to_label);
        html += row('Время', fmtHours(d.estimated_time_min));
        html += row('Тариф', d.price_per_seat + ' + ' + d.fixed_price + ' ₽');
        html += '<div class="actions">';
        html += '<button class="btn btn-gold" onclick="showEditDirection(' + d.id + ')">✏️</button>';
        if (d.enabled !== false) html += '<button class="btn btn-danger" onclick="toggleDirection(' + d.id + ',false)">Выкл</button>';
        else html += '<button class="btn btn-success" onclick="toggleDirection(' + d.id + ',true)">Вкл</button>';
        html += '</div></div>';
      }
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) {
    content.innerHTML = '<div class="empty" style="color:#f85149">Ошибка: ' + e.message + '</div>';
  });
}

function renderQueueLeg(board) {
  var html = '';
  var maxCar = board.max_single_car_seats != null ? board.max_single_car_seats : 0;
  var w = board.waiting || {};
  if (w.order_count) {
    html += '<div style="margin:8px 0;padding:8px;background:rgba(245,197,24,.06);border-radius:8px">';
    html += '<div style="font-weight:600;color:var(--gold)">📋 Без машины: ' + w.total_seats + ' мест (' + w.order_count + ' ' + pluralZayavki(w.order_count) + ')';
    if (maxCar > 0) html += ' · макс. в 1 машине: ' + maxCar;
    html += '</div>';
    var olist = w.orders || [];
    for (var wi = 0; wi < olist.length && wi < 8; wi++) {
      var wo = olist[wi];
      var overflow = maxCar > 0 && wo.seats > maxCar;
      html += '<div style="font-size:11px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;gap:8px">';
      html += '<span>#' + wo.id + ' · ' + wo.seats + ' мест · ' + escapeHtml(wo.from_location);
      if (overflow) html += ' <span style="color:var(--danger)">(перебор)</span>';
      html += '</span>';
      html += '<button class="btn btn-gold" style="padding:4px 8px;font-size:11px" onclick="showAssignModal(' + wo.id + ',' + board.direction_id + ',' + wo.seats + ')">Назначить</button>';
      html += '</div>';
    }
    html += '</div>';
  }
  var cars = board.loading_cars || [];
  for (var ci = 0; ci < cars.length; ci++) {
    var c = cars[ci];
    html += '<div style="margin:8px 0;padding:8px;border-left:2px solid var(--gold)">';
    html += '<div style="font-weight:600">' + (c.full_name || ('#'+c.driver_id)) + '</div>';
    html += '<div style="font-size:12px;color:var(--gold)">' + c.status_label + '</div>';
    var pax = c.passengers || [];
    for (var pi = 0; pi < pax.length; pi++) {
      html += '<div style="font-size:11px">#' + pax[pi].order_id + ' · ' + pax[pi].seats + ' мест</div>';
    }
    html += '</div>';
  }
  var q = ensureArray(board.queue);
  html += row('В очереди водителей', q.length);
  for (var j = 0; j < q.length; j++) {
    var qq = q[j];
    var name = qq.full_name || ('#' + qq.driver_id);
    html += '<div class="row"><span class="lbl">' + (j+1) + '. ' + name + '</span><span class="val" style="font-size:11px">';
    html += escapeHtml(qq.loading_status || '—');
    if (qq.free_seats != null) {
      html += '<br/>Платформа: ' + qq.free_seats + ' мест';
      if (qq.own_seats_reserved) html += ' (своих: ' + qq.own_seats_reserved + ')';
    }
    if (qq.loading_label) html += '<br/>⏱ ' + escapeHtml(qq.loading_label);
    if (qq.passengers && qq.passengers.length) {
      for (var pj = 0; pj < qq.passengers.length; pj++) {
        html += '<br/>#' + qq.passengers[pj].order_id + ' · ' + qq.passengers[pj].seats + 'м';
      }
    }
    if (j > 0) html += ' <button class="btn btn-outline" style="padding:4px 8px" onclick="moveQueue(' + board.direction_id + ',' + j + ',-1)">↑</button>';
    if (j < q.length - 1) html += ' <button class="btn btn-outline" style="padding:4px 8px" onclick="moveQueue(' + board.direction_id + ',' + j + ',1)">↓</button>';
    html += '</span></div>';
  }
  return html;
}

function renderQueue() {
  api('/api/admin/directions/grouped').then(function(groups) {
    groups = ensureArray(groups);
    if (!groups.length) { content.innerHTML = '<div class="empty">Нет маршрутов</div>'; return; }
    var tasks = [];
    groups.forEach(function(g) {
      if (g.forward) tasks.push({ g: g, leg: g.forward, label: 'Туда' });
      if (g.reverse) tasks.push({ g: g, leg: g.reverse, label: '↩' });
    });
    return Promise.all(tasks.map(function(tk) {
      return api('/api/admin/directions/' + tk.leg.id + '/board').then(function(board) {
        board.direction_id = tk.leg.id;
        return { tk: tk, board: board };
      });
    })).then(function(rows) {
      var html = '';
      var lastG = null;
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        if (!lastG || lastG !== r.tk.g) {
          if (lastG) html += cardEnd();
          html += cardStart('🛣 ' + (r.tk.g.label || ''));
          lastG = r.tk.g;
        }
        html += '<div style="margin-top:8px;font-weight:600;color:var(--gold)">' + r.tk.label + ': ' + r.tk.leg.from_label + ' → ' + r.tk.leg.to_label + '</div>';
        html += renderQueueLeg(r.board);
      }
      if (lastG) html += cardEnd();
      content.innerHTML = html;
    });
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}


function moveQueue(directionId, index, delta) {
  api('/api/admin/directions/' + directionId + '/queue').then(function(q) {
    q = ensureArray(q);
    var ids = q.map(function(x) { return x.driver_id; });
    var ni = index + delta;
    if (ni < 0 || ni >= ids.length) return;
    var t = ids[index]; ids[index] = ids[ni]; ids[ni] = t;
    return api('/api/admin/directions/' + directionId + '/queue/reorder', {
      method: 'POST', body: JSON.stringify({ driver_ids: ids })
    });
  }).then(function() { toast('Очередь обновлена'); renderQueue(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

// Proposals
function renderProposals() {
  api('/api/admin/reserve-groups').then(function(reserve) {
    var rhtml = '';
    if (reserve && reserve.length) {
      rhtml += '<h3 style="margin:0 0 12px;color:var(--gold)">Резерв маршрутов</h3>';
      for (var r = 0; r < reserve.length; r++) {
        var g = reserve[r];
        rhtml += cardStart(g.from_label + ' → ' + g.to_label, 'reserved');
        rhtml += row('Водителей', g.drivers_count + ' / ' + g.needed);
        if (g.drivers && g.drivers.length) {
          for (var rd = 0; rd < g.drivers.length; rd++) {
            var gd = g.drivers[rd];
            rhtml += row((rd + 1) + '. ' + (gd.full_name || gd.name || 'ID:' + gd.id), gd.phone || '—');
          }
        }
        rhtml += cardEnd();
      }
    }
    _renderProposalsList(rhtml);
  }).catch(function() { _renderProposalsList(''); });
}

function _renderProposalsList(reservePrefix) {
  api('/api/admin/proposals/grouped?status=pending,reserved').then(function(grouped) {
    var groups = ensureArray(grouped);
    var html = reservePrefix || '';
    if (groups.length === 0 && !html) { content.innerHTML = '<div class="empty">Нет заявок</div>'; return; }
    for (var gi = 0; gi < groups.length; gi++) {
      var g = groups[gi];
      var plist = g.proposals || [];
      if (plist.length === 0) continue;
      var p0 = plist[0];
      var title = g.label || (p0.from_label + ' ↔ ' + p0.to_label);
      html += cardStart('🛣 ' + title + ' (' + plist.length + ' водит.)', 'pending');
      for (var i = 0; i < plist.length; i++) {
        var p = plist[i];
        html += row((i+1) + '. ' + (p.proposer_name || 'ID:'+p.proposer_id), p.from_label + ' → ' + p.to_label);
        if (p.status === 'reserved') html += row('Статус', 'в резерве маршрута');
        else if (p.status && p.status !== 'pending') html += row('Статус', statusLabel(p.status));
        html += row('Тариф', p.price_per_seat + ' + ' + p.fixed_price);
        html += '<div class="actions">';
        html += '<button class="btn btn-success" onclick="approveProposal(' + p.id + ')">✅ Одобрить</button>';
        html += '<button class="btn btn-danger" onclick="rejectProposal(' + p.id + ')">Отклонить</button>';
        html += '</div>';
      }
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = (reservePrefix || '') + '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function approveProposal(id) {

function rejectProposal(id) {

function doRejectProposal(id) {
  var note = document.getElementById('m-note').value;
  api('/api/admin/proposals/' + id + '/reject', { method: 'POST', body: JSON.stringify({ note: note || null }) })

// Payments
function renderPayments() {
  api('/api/admin/payments').then(function(data) {
    var payments = ensureArray(data);
    if (payments.length === 0) { content.innerHTML = '<div class="empty">Нет платежей</div>'; return; }
    var html = '';
    for (var i = 0; i < payments.length; i++) {
      var p = payments[i];
      html += cardStart('Платёж #' + p.id, p.status);
      html += row('Водитель', '#' + p.driver_id);
      html += row('Сумма', p.amount + ' ₽');
      html += row('Провайдер', p.provider || '—');
      if (p.status === 'pending' || p.status === 'awaiting_admin') {
        html += '<div class="actions">';
        html += '<button class="btn btn-gold" onclick="checkPayment(' + p.id + ')">Проверить в ЮKассе</button>';
        html += '<button class="btn btn-success" onclick="showConfirmPayment(' + p.id + ',\'' + p.amount + '\')">Подтвердить</button>';
        html += '</div>';
      }
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function checkPayment(paymentId) {
  api('/api/admin/payments/' + paymentId + '/check', { method: 'POST' })
    .then(function(res) {
      if (res.status === 'confirmed' || res.status === 'already_confirmed') toast('Платёж подтверждён!');
      else if (res.status === 'canceled') toast('Платёж отменён');
      else toast('Статус: ' + res.status);
      renderPayments();
    }).catch(function(e) { toast('Ошибка: ' + e.message); });
}

function showConfirmPayment(paymentId, amount) {
  var html = '<h3>Подтвердить платёж #' + paymentId + '</h3>';
  html += '<div class="form-group"><label>Сумма (₽)</label><input id="m-amount" type="number" value="' + amount + '"/></div>';
  html += '<div class="actions"><button class="btn btn-success" onclick="doConfirmPayment(' + paymentId + ')">Подтвердить</button>';
  html += '<button class="btn btn-outline" onclick="closeModal()">Отмена</button></div>';
  openModal(html);
}

function doConfirmPayment(paymentId) {
  var amount = document.getElementById('m-amount').value;
  api('/api/admin/payments/' + paymentId + '/confirm', { method: 'POST', body: JSON.stringify({ amount: +amount }) })
    .then(function() { closeModal(); toast('Платёж подтверждён'); renderPayments(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}



function prefillCalendarFromRequest(req) {
  pendingFulfillOrderId = req.order_id;
  var dirEl = document.getElementById('st-dir');
  var depEl = document.getElementById('st-dep');
  var seatsEl = document.getElementById('st-seats');
  if (dirEl) dirEl.value = String(req.direction_id);
  if (depEl) depEl.value = req.requested_departure_at || '';
  if (seatsEl) seatsEl.value = String(Math.max(6, req.seats || 1));
  toast('Заявка #' + req.order_id + ' — заполнена форма рейса');
  var form = document.getElementById('st-form-card');
  if (form) form.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderCalendar() {
  Promise.all([
    api('/api/admin/scheduled-trips'),
    api('/api/admin/directions'),
    api('/api/admin/drivers'),
    api('/api/admin/trip-departure-requests?status=pending')
  ])
    .then(function(results) {
      var trips = ensureArray(results[0]);
      var directions = ensureArray(results[1]);
      var drivers = ensureArray(results[2]);
      var requests = ensureArray(results[3]);
      cache.scheduledTrips = trips;
      var html = '';
      if (requests.length) {
        html += '<div class="card"><div class="card-title">Заявки на рейс (' + requests.length + ')</div>';
        for (var ri = 0; ri < requests.length; ri++) {
          var req = requests[ri];
          html += '<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">';
          html += row('Заказ', '#' + req.order_id);
          html += row('Пассажир', esc(req.display_name) + (req.username ? ' @' + esc(req.username) : ''));
          html += row('Маршрут', esc(req.from_label + ' → ' + req.to_label));
          html += row('Выезд', esc(req.requested_departure_at));
          html += row('Места', req.seats);
          html += row('Откуда / Куда', esc(req.from_location) + ' → ' + esc(req.to_location));
          html += '<div class="actions"><button type="button" class="btn btn-gold" onclick="prefillCalendarFromRequest(cache.tripRequests[' + ri + '])">Создать рейс из заявки</button></div>';
          html += '</div>';
        }
        html += '</div>';
      }
      cache.tripRequests = requests;
      html += '<div class="card" id="st-form-card"><div class="card-title">Новый рейс</div>';
      if (pendingFulfillOrderId) {
        html += '<p style="font-size:12px;color:var(--gold);margin-bottom:10px">Привязка к заказу #' + pendingFulfillOrderId + ' <button type="button" class="btn btn-outline" style="padding:4px 10px;font-size:11px" onclick="pendingFulfillOrderId=null;renderCalendar()">Сбросить</button></p>';
      }
      html += '<div class="form-group"><label>Направление</label><select id="st-dir">';
      for (var di = 0; di < directions.length; di++) {
        var dr = directions[di];
        html += '<option value="' + dr.id + '">' + esc(dr.from_label + ' → ' + dr.to_label) + '</option>';
      }
      html += '</select></div>';
      html += '<div class="form-group"><label>Дата и время (ДД.ММ.ГГГГ ЧЧ:ММ)</label>';
      html += '<input id="st-dep" placeholder="25.05.2026 08:00" inputmode="numeric"/></div>';
      html += '<p style="font-size:12px;color:var(--text-dim);margin:-6px 0 10px">Вводите так же, как в списке рейсов ниже.</p>';
      html += '<div class="form-group"><label>Мест</label><input id="st-seats" type="number" value="6"/></div>';
      html += '<div class="form-group"><label>Водитель</label><select id="st-driver"><option value="">—</option>';
      for (var vi = 0; vi < drivers.length; vi++) {
        var dv = drivers[vi];
        if (dv.status === 'active') html += '<option value="' + dv.id + '">' + esc(dv.full_name || dv.id) + '</option>';
      }
      html += '</select></div>';
      html += '<div class="actions"><button class="btn btn-gold" onclick="createScheduledTrip()">Создать рейс</button></div></div>';
      if (!trips.length) {
        html += '<div class="empty">Нет запланированных рейсов</div>';
        content.innerHTML = html;
        return;
      }
      for (var ti = 0; ti < trips.length; ti++) {
        var t = trips[ti];
        var free = Math.max(0, (t.seats_total || 0) - (t.seats_booked || 0));
        html += cardStart(t.from_label + ' → ' + t.to_label, t.status);
        html += row('Выезд', esc(t.departure_at || '—'));
        html += row('Места', (t.seats_booked || 0) + ' / ' + t.seats_total + ' (свободно ' + free + ')');
        if (t.driver_name) html += row('Водитель', esc(t.driver_name));
        html += row('Создан', t.created_by || '—');
        if (t.status === 'open' || t.status === 'full') {
          html += '<div class="actions"><button class="btn btn-danger" onclick="cancelScheduledTrip(' + t.id + ')">Отменить</button></div>';
        }
        html += cardEnd();
      }
      content.innerHTML = html;
    }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function createScheduledTrip() {
  var body = {
    direction_id: +document.getElementById('st-dir').value,
    departure_at: document.getElementById('st-dep').value.trim(),
    seats_total: +document.getElementById('st-seats').value || 6,
    driver_id: document.getElementById('st-driver').value ? +document.getElementById('st-driver').value : null,
    status: 'open'
  };
  if (pendingFulfillOrderId) body.fulfill_order_id = pendingFulfillOrderId;
  if (!body.departure_at) { toast('Укажите дату выезда'); return; }
  if (!/^\d{1,2}\.\d{1,2}\.\d{4}\s+\d{1,2}:\d{2}$/.test(body.departure_at)) {
    toast('Формат: ДД.ММ.ГГГГ ЧЧ:ММ (например 25.05.2026 08:00)');
    return;
  }
  api('/api/admin/scheduled-trips', { method: 'POST', body: JSON.stringify(body) })
    .then(function() {
      toast(pendingFulfillOrderId ? 'Рейс создан, пассажир привязан' : 'Рейс создан');
      pendingFulfillOrderId = null;
      renderCalendar();
    })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function renderUsers() {

  api('/api/admin/users?q=' + encodeURIComponent(q) + '&page=' + usersPage + '&page_size=30')
    .then(function(data) {
      var items = ensureArray(data.items);
      var html = '<div class="card"><div class="card-title">Пользователи</div>';
      html += '<div class="users-search">';
      html += '<input id="users-q" placeholder="ID или @username / имя" value="' + esc(q) + '"/>';

      html += '</tr></thead><tbody>';

        html += '<td>' + esc(u.display_name) + '</td>';
        html += '<td>' + esc((u.created_at || '').slice(0, 10)) + '</td>';
        html += '<td>' + (u.orders_total || 0) + '</td>';
        html += '<td>' + (u.orders_completed || 0) + '</td>';
        html += '<td>' + (u.orders_awaiting_trip || 0) + '</td>';
        html += '<td><span class="badge b-' + (u.status === 'blocked' ? 'blocked' : 'active') + '">' + esc(u.status === 'blocked' ? 'blocked' : 'ok') + '</span></td>';
        html += '<td><button type="button" class="btn btn-outline" style="padding:6px 10px;font-size:11px" onclick="showUserDetail(' + u.telegram_id + ')">Подробнее</button></td>';
        html += '</tr>';
      }
      html += '</tbody></table></div>';
      html += '<div class="users-pager">';
      if (data.page > 1) html += '<button type="button" class="btn btn-outline" onclick="usersGoPage(' + (data.page - 1) + ')">Назад</button>';
      html += '<span style="font-size:13px;color:var(--text-dim)">стр. ' + data.page + ' · всего ' + data.total + '</span>';
      if (data.page < data.total_pages) html += '<button type="button" class="btn btn-outline" onclick="usersGoPage(' + (data.page + 1) + ')">Вперёд</button>';
      html += '</div></div>';
      html += '<div id="user-detail-panel" class="user-detail-panel"></div>';
      content.innerHTML = html;
      if (selectedUserTgId) showUserDetail(selectedUserTgId, true);
    })
    .catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function usersSearchSubmit() {
  var el = document.getElementById('users-q');
  usersSearchQ = el ? el.value.trim() : '';
  usersPage = 1;
  selectedUserTgId = null;
  renderUsers();
}

function usersGoPage(p) {
  usersPage = p;
  renderUsers();
}

function showUserDetail(telegramId, skipRerender) {
  selectedUserTgId = telegramId;
  if (!skipRerender) renderUsers();
  api('/api/admin/users/' + telegramId)
    .then(function(u) {
      var panel = document.getElementById('user-detail-panel');
      if (!panel) return;
      var html = '<div class="card"><div class="card-title">Пользователь ' + u.telegram_id + '</div>';
      html += row('Username', u.username ? '@' + esc(u.username) : '—');
      html += row('Имя', esc(u.display_name));
      html += row('Регистрация', esc((u.created_at || '').slice(0, 19)));
      html += row('Последняя активность', esc(u.last_seen_at ? u.last_seen_at.slice(0, 19) : (u.last_order_at || '—')));
      html += row('Заказов', String(u.orders_total));
      html += row('Завершено', String(u.orders_completed));
      html += row('Ждёт рейса', String(u.orders_awaiting_trip));
      html += row('Статус', u.is_blocked ? 'заблокирован' : 'ok');
      if (u.pending_trip_requests && u.pending_trip_requests.length) {
        html += '<p style="font-size:12px;color:var(--gold);margin-top:10px">Ожидают рейса:</p>';
        for (var pi = 0; pi < u.pending_trip_requests.length; pi++) {
          var pr = u.pending_trip_requests[pi];
          html += '<p style="font-size:12px;margin:4px 0">#' + pr.order_id + ' · ' + esc(pr.requested_departure || '') + ' · ' + pr.seats + ' мест</p>';
        }
      }
      if (u.orders && u.orders.length) {
        html += '<p style="font-size:12px;color:var(--text-dim);margin-top:12px;font-weight:600">Последние заказы</p>';
        for (var oi = 0; oi < u.orders.length; oi++) {
          var o = u.orders[oi];
          html += '<p style="font-size:12px;margin:4px 0">#' + o.id + ' · ' + esc(statusLabel(o.status)) + ' · ' + esc(o.from_label + ' → ' + o.to_label);
          if (o.trip_departure) html += ' · рейс ' + esc(o.trip_departure);
          html += '</p>';
        }
      }
      html += '<div class="actions">';
      html += tgLink(u.telegram_id, 'Написать в Telegram');
      if (u.is_blocked) {
        html += '<button type="button" class="btn btn-outline" onclick="unblockUser(' + u.telegram_id + ')">Разблокировать</button>';
      } else {
        html += '<button type="button" class="btn btn-danger" onclick="blockUser(' + u.telegram_id + ')">Заблокировать</button>';
      }
      html += '</div></div>';
      panel.innerHTML = html;
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function blockUser(tid) {
  if (!confirm('Заблокировать пользователя ' + tid + '?')) return;
  api('/api/admin/users/' + tid + '/block', { method: 'POST' })
    .then(function() { toast('Заблокирован'); showUserDetail(tid, true); renderUsers(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function unblockUser(tid) {
  api('/api/admin/users/' + tid + '/unblock', { method: 'POST' })
    .then(function() { toast('Разблокирован'); showUserDetail(tid, true); renderUsers(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function cancelScheduledTrip(id) {
  if (!confirm('Отменить рейс #' + id + '?')) return;
  api('/api/admin/scheduled-trips/' + id, { method: 'DELETE' })
    .then(function() { toast('Отменён'); renderCalendar(); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

function renderAudit() {
  api('/api/admin/audit?limit=80').then(function(rows) {
    rows = ensureArray(rows);
    if (!rows.length) { content.innerHTML = '<div class="empty">Пусто</div>'; return; }
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      var a = rows[i];
      html += cardStart(a.action, '');
      html += row('Когда', (a.created_at || '').slice(0, 19));
      html += row('Сущность', (a.entity_type || '') + ' #' + (a.entity_id || ''));
      if (a.actor_telegram_id) html += row('Актор TG', a.actor_telegram_id);
      if (a.payload) html += row('Детали', a.payload);
      html += cardEnd();
    }
    content.innerHTML = html;
  }).catch(function(e) { content.innerHTML = '<div class="empty">Ошибка: ' + e.message + '</div>'; });
}

function sendBackup() {
  toast('Отправляем бэкап…');
  api('/api/admin/backup', { method: 'POST' })
    .then(function() { toast('Бэкап отправлен в этот чат Telegram'); })
    .catch(function(e) { toast('Ошибка: ' + e.message); });
}

// Init
auth().then(function(ok) {
  if (ok === true) {
    renderTab('dashboard');
  } else {
    content.innerHTML = '<div class="empty">Не удалось войти. Закройте Mini App и откройте снова из бота (/admin).</div>';
  }
});
</script>
